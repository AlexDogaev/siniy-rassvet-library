<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Библиотека Синего Рассвета</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="min-h-screen relative">
  <img src="./logo.png" alt="" aria-hidden="true"
       class="pointer-events-none fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[520px] max-w-[80vw] opacity-[0.06] select-none z-0" />

  <div class="relative z-10">
    <header class="border-b border-slate-200/70 bg-white/80 backdrop-blur">
      <div class="max-w-5xl mx-auto px-6 py-10">
        <div class="flex items-center gap-3 mb-3">
          <img src="./logo.png" alt="Синий Рассвет" class="w-12 h-12 rounded-xl object-contain" />
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Библиотека Синего Рассвета</h1>
            <p class="text-sm text-slate-500">Полезные материалы и ссылки для подписчиков канала</p>
          </div>
        </div>

        <div class="relative mt-6">
          <input id="search" type="text" placeholder="Поиск по материалам…"
                 class="w-full pl-4 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>

        <div id="cats" class="flex flex-wrap gap-2 mt-4"></div>
      </div>
    </header>

    <main id="list-view" class="max-w-5xl mx-auto px-6 py-8">
      <div id="count" class="text-sm text-slate-500 mb-4"></div>
      <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <div id="empty" class="text-center py-16 text-slate-400 hidden">Ничего не найдено</div>
    </main>

    <main id="detail-view" class="max-w-3xl mx-auto px-6 py-8 hidden"></main>

    <footer class="max-w-5xl mx-auto px-6 py-10 text-center text-sm text-slate-400">
      Исходная библиотека на
      <a href="https://disk.yandex.ru/d/9DQ_8k0wHn9A2Q" target="_blank" rel="noopener" class="text-blue-600 hover:underline">Яндекс.Диске</a>
    </footer>
  </div>
</div>

<script>
const FOLDER_URL = "https://disk.yandex.ru/d/9DQ_8k0wHn9A2Q";
let items = [];
let cats = ["Все"];
let activeCat = "Все";
let query = "";
const expanded = new Set();

function prettyName(url) {
  try {
    const u = new URL(url);
    let name = u.searchParams.get("name") || "";
    if (!name) {
      const parts = decodeURIComponent(u.pathname).split("/");
      name = parts[parts.length - 1] || url;
    }
    return name.replace(/\.[a-z0-9]+$/i, "").replace(/_/g, " ").trim();
  } catch (e) { return url; }
}

const iconSvg = (type) => {
  if (type === "folder") return '<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>';
  if (type === "xlsx") return '<svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>';
  return '<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
};

function slugify(s) {
  return (s || "").toLowerCase()
    .replace(/[^a-zа-яё0-9]+/gi, "-")
    .replace(/^-+|-+$/g, "");
}

function getItemSlug(i) { return i.slug || slugify(i.title); }

async function loadData() {
  try {
    const res = await fetch("./data.json", { cache: "no-store" });
    const data = await res.json();
    items = data.items || [];
    cats = ["Все", ...Array.from(new Set(items.map(i => i.category)))];
    route();
  } catch (e) {
    document.getElementById("grid").innerHTML =
      '<div class="col-span-full text-center text-red-500 py-10">Не удалось загрузить data.json. Если открываете файл локально (file://), используйте локальный HTTP-сервер или GitHub Pages.</div>';
  }
}

function render() {
  const catsEl = document.getElementById("cats");
  catsEl.innerHTML = cats.map(c => `
    <button data-cat="${c}" class="px-3 py-1.5 rounded-full text-sm transition ${activeCat === c ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}">${c}</button>
  `).join("");
  catsEl.querySelectorAll("button").forEach(b => b.addEventListener("click", () => { activeCat = b.dataset.cat; render(); }));

  const q = query.trim().toLowerCase();
  function hay(i) {
    const parts = [i.title, i.desc, i.category];
    (i.links || []).forEach(l => { parts.push(l.title); parts.push(l.desc); });
    (i.books || []).forEach(b => { parts.push(b.title); parts.push(b.author); parts.push(b.annotation); });
    (i.children || []).forEach(c => { parts.push(c.title); parts.push(c.desc); });
    return parts.filter(Boolean).join(" \n ").toLowerCase();
  }
  const filtered = items.filter(i => {
    const mc = activeCat === "Все" || i.category === activeCat;
    const mq = !q || hay(i).includes(q);
    return mc && mq;
  });

  document.getElementById("count").textContent = "Найдено материалов: " + filtered.length;
  document.getElementById("empty").classList.toggle("hidden", filtered.length !== 0);
  document.getElementById("grid").innerHTML = filtered.map(i => {
    const hasChildren = Array.isArray(i.children) && i.children.length > 0;
    const isOpen = expanded.has(i.title);
    const head = `
      <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100">${iconSvg(i.type)}</div>
        ${hasChildren
          ? `<svg class="w-4 h-4 text-slate-400 transition-transform ${isOpen ? "rotate-180" : ""}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>`
          : `<svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 3h7v7M10 14L21 3M21 14v7H3V3h7"/></svg>`}
      </div>
      <h3 class="font-medium text-slate-900 leading-snug mb-2">${i.title}</h3>
      <p class="text-sm text-slate-500 leading-relaxed mb-4 flex-1">${i.desc}</p>
      <div class="text-xs text-slate-400 uppercase tracking-wide">${i.category}${hasChildren ? " · " + i.children.length + " док." : ""}</div>`;

    if (hasChildren) {
      const list = isOpen ? `
        <div class="mt-4 pt-4 border-t border-slate-100 space-y-2">
          ${i.children.map(url => `
            <a href="${url}" target="_blank" rel="noopener"
               class="flex items-start gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
              <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              <span>${prettyName(url)}</span>
            </a>`).join("")}
        </div>` : "";
      return `
        <div data-toggle="${i.title}"
             class="cursor-pointer bg-white/90 border ${isOpen ? "border-blue-400 shadow-md" : "border-slate-200"} rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
          ${head}${list}
        </div>`;
    }
    if (Array.isArray(i.links) || Array.isArray(i.books)) {
      return `
        <a href="#/${getItemSlug(i)}"
           class="group bg-white/90 border border-slate-200 rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
          ${head}
        </a>`;
    }
    return `
      <a href="${i.url || FOLDER_URL}" target="_blank" rel="noopener"
         class="group bg-white/90 border border-slate-200 rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
        ${head}
      </a>`;
  }).join("");

  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const k = el.getAttribute("data-toggle");
      if (expanded.has(k)) expanded.delete(k); else expanded.add(k);
      render();
    });
  });
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function renderDetail(item) {
  let bodyHtml = "";
  if (Array.isArray(item.books)) {
    bodyHtml = `<div class="space-y-2">${item.books.map((b,idx)=>`
      <details class="group bg-white/90 border border-slate-200 rounded-xl open:border-blue-400 open:shadow-sm transition">
        <summary class="cursor-pointer list-none p-4 flex items-start justify-between gap-3">
          <div>
            <div class="font-medium text-slate-900 leading-snug">${escapeHtml(b.title)}</div>
            ${b.author ? `<div class="text-sm text-slate-500 mt-0.5">${escapeHtml(b.author)}</div>` : ""}
          </div>
          <svg class="w-4 h-4 mt-1 flex-shrink-0 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </summary>
        <div class="px-4 pb-4 pt-0 text-sm text-slate-600 leading-relaxed whitespace-pre-line border-t border-slate-100">${escapeHtml(b.annotation)}</div>
      </details>`).join("")}</div>
      ${item.footer ? `<div class="mt-6 text-sm text-slate-500">${escapeHtml(item.footer)}</div>` : ""}`;
  } else {
    const linksHtml = (item.links || []).map(l => {
      const tag = l.url ? "a" : "div";
      const attrs = l.url ? `href="${l.url}" target="_blank" rel="noopener"` : "";
      const hover = l.url ? "hover:border-blue-400 hover:shadow-sm" : "";
      return `<${tag} ${attrs} class="block bg-white/90 border border-slate-200 rounded-xl p-4 ${hover} transition">
        <div class="font-medium text-slate-900">${l.title}</div>
        ${l.desc ? `<div class="text-sm text-slate-500 mt-1">${l.desc}</div>` : ""}
        ${l.url ? `<div class="text-xs text-blue-600 mt-2 truncate">${l.url}</div>` : ""}
      </${tag}>`;
    }).join("");
    bodyHtml = `<div class="space-y-3">${linksHtml || '<div class="text-slate-400">Пока нет ссылок.</div>'}</div>`;
  }

  document.getElementById("detail-view").innerHTML = `
    <a href="#/" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 mb-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Назад к библиотеке
    </a>
    <div class="mb-2 text-xs text-slate-400 uppercase tracking-wide">${item.category}</div>
    <h2 class="text-3xl font-semibold tracking-tight mb-3">${item.title}</h2>
    <p class="text-slate-500 mb-8">${item.desc}</p>
    ${bodyHtml}`;
}

function route() {
  const hash = location.hash.replace(/^#\/?/, "");
  const listView = document.getElementById("list-view");
  const detailView = document.getElementById("detail-view");
  if (hash) {
    const item = items.find(i => getItemSlug(i) === hash);
    if (item && (Array.isArray(item.links) || Array.isArray(item.books))) {
      listView.classList.add("hidden");
      detailView.classList.remove("hidden");
      renderDetail(item);
      window.scrollTo(0, 0);
      return;
    }
  }
  listView.classList.remove("hidden");
  detailView.classList.add("hidden");
  render();
}

window.addEventListener("hashchange", route);
document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  if (location.hash && location.hash !== "#/") {
    history.replaceState(null, "", "#/");
    document.getElementById("detail-view").classList.add("hidden");
    document.getElementById("list-view").classList.remove("hidden");
  }
  render();
});
loadData();
</script>
</body>
</html>
