<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Библиотека Синего Рассвета</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="min-h-screen relative">
  <img src="./logo.png" alt="" aria-hidden="true"
       class="pointer-events-none fixed left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[520px] max-w-[80vw] opacity-[0.06] select-none z-0" />

  <div class="relative z-10">
    <header class="border-b border-slate-200/70 bg-white/80 backdrop-blur">
      <div class="max-w-5xl mx-auto px-6 py-10">
        <div class="flex items-center gap-3 mb-3">
          <img src="./logo.png" alt="Синий Рассвет" class="w-12 h-12 rounded-xl object-contain" />
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Библиотека Синего Рассвета</h1>
            <p class="text-sm text-slate-500">Полезные материалы и ссылки для подписчиков канала</p>
          </div>
        </div>

        <div class="relative mt-6">
          <input id="search" type="text" placeholder="Поиск по материалам…"
                 class="w-full pl-4 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" />
        </div>

        <div id="cats" class="flex flex-wrap gap-2 mt-4"></div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
      <div id="count" class="text-sm text-slate-500 mb-4"></div>
      <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <div id="empty" class="text-center py-16 text-slate-400 hidden">Ничего не найдено</div>
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-10 text-center text-sm text-slate-400">
      Исходная библиотека на
      <a href="https://disk.yandex.ru/d/9DQ_8k0wHn9A2Q" target="_blank" rel="noopener" class="text-blue-600 hover:underline">Яндекс.Диске</a>
    </footer>
  </div>
</div>

<script>
const FOLDER_URL = "https://disk.yandex.ru/d/9DQ_8k0wHn9A2Q";
const items = [
  { title: "Шаблоны писем и претензий", type: "folder", category: "Документы и шаблоны", desc: "Готовые шаблоны для деловой переписки и претензий.", children: [
      "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FШаблоны%20писем%20и%20претензий%2FПисьмо%20в%20ТП%20о%20возобновлении%20видимости%20товара%20в%20регионах%20.docx&name=Письмо%20в%20ТП%20о%20возобновлении%20видимости%20товара%20в%20регионах%20.docx&nosw=1",
      "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FШаблоны%20писем%20и%20претензий%2FПисьмо%20в%20ТП%20о%20закрытии%20видимости%20товара%20в%20регионах.docx&name=Письмо%20в%20ТП%20о%20закрытии%20видимости%20товара%20в%20регионах.docx&nosw=1",
      "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FШаблоны%20писем%20и%20претензий%2FШаблон_претензии_потеря_товара_Озон.docx&name=Шаблон_претензии_потеря_товара_Озон.docx"
    ] },
  { title: "Важные посты о Яндекс Маркет", type: "docx", category: "Маркетплейсы", desc: "Подборка ключевых постов канала про работу с Яндекс Маркет.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20о%20Яндекс%20Маркет.docx&name=Важные%20посты%20о%20Яндекс%20Маркет.docx" },
  { title: "Важные посты по Честному Знаку", type: "docx", category: "Регулирование", desc: "Всё самое важное про маркировку и систему Честный Знак.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20по%20Честному%20Знаку.docx&name=Важные%20посты%20по%20Честному%20Знаку.docx" },
  { title: "Важные посты по «белому» ввозу", type: "docx", category: "ВЭД и логистика", desc: "Подборка постов про белый импорт и легальный ввоз товаров.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20по%20белому%20ввозу.docx&name=Важные%20посты%20по%20белому%20ввозу.docx&nosw=1" },
  { title: "Важные посты по логистике", type: "docx", category: "ВЭД и логистика", desc: "Логистика, доставка, склады — ключевые материалы.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20по%20логистике.docx&name=Важные%20посты%20по%20логистике.docx&nosw=1" },
  { title: "Важные посты по маркетингу", type: "docx", category: "Маркетинг", desc: "Подборка постов про продвижение и маркетинг.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20по%20маркетингу.docx&name=Важные%20посты%20по%20маркетингу.docx" },
  { title: "Важные посты по налогам и финансам", type: "docx", category: "Налоги и финансы", desc: "Налоги, бухгалтерия, финансовые вопросы селлеров.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20по%20налогам%20и%20финансам.docx&name=Важные%20посты%20по%20налогам%20и%20финансам.docx" },
  { title: "Важные статьи про нейросети", type: "docx", category: "Нейросети", desc: "Подборка материалов о применении ИИ в бизнесе.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FВажные%20посты%20про%20нейросети.docx&name=Важные%20посты%20про%20нейросети.docx&nosw=1" },
  { title: "Книги, которые рекомендуют наши подписчики", type: "docx", category: "Обучение", desc: "Список книг от сообщества канала.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FКниги%2C%20которые%20рекомендуют%20наши%20подписчики.docx&name=Книги%2C%20которые%20рекомендуют%20наши%20подписчики.docx&nosw=1" },
  { title: "Материалы Александра Догаева", type: "docx", category: "Авторские материалы", desc: "Сборник материалов и постов Александра Догаева.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FМатериалы%20Александра%20Догаева.docx&name=Материалы%20Александра%20Догаева.docx" },
  { title: "Наши авторы", type: "docx", category: "Авторские материалы", desc: "Список авторов канала и их публикации.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FНаши%20авторы.docx&name=Наши%20авторы.docx&nosw=1" },
  { title: "Посты про Wildberries", type: "docx", category: "Маркетплейсы", desc: "Подборка ключевых постов про работу с Wildberries.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FПосты%20по%20Wildberries.docx&name=Посты%20по%20Wildberries.docx&nosw=1" },
  { title: "Ссылки на Базу Знаний", type: "xlsx", category: "База знаний", desc: "Таблица со ссылками на статьи Базы Знаний.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FСсылки%20на%20Базу%20Знаний.xlsx&name=Ссылки%20на%20Базу%20Знаний.xlsx&nosw=1" },
  { title: "Ссылки на Курсы и Калькулятор", type: "docx", category: "Обучение", desc: "Ссылки на обучающие курсы и полезный калькулятор.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FСсылки%20на%20КУРСЫ%20и%20КАЛЬКУЛЯТОР.docx&name=Ссылки%20на%20КУРСЫ%20и%20КАЛЬКУЛЯТОР.docx&nosw=1" },
  { title: "Ссылки на партнеров, которым мы доверяем", type: "docx", category: "Партнёры", desc: "Список проверенных партнёров канала.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FСсылки%20на%20партнеров%2C%20которым%20мы%20доверяем.docx&name=Ссылки%20на%20партнеров%2C%20которым%20мы%20доверяем.docx" },
  { title: "Ссылки на чаты и рубрики Синего Рассвета", type: "docx", category: "Сообщество", desc: "Навигация по чатам и рубрикам канала Синий Рассвет.", url: "https://docs.yandex.ru/docs/view?url=ya-disk-public%3A%2F%2FPQoRblrNRSsHnQa%2FaVkes3JXi%2FpvdXTUPqI67Mmgpa3GMwZc3JwAl0rFIMwwctHZq%2FJ6bpmRyOJonT3VoXnDag%3D%3D%3A%2FСсылки%20на%20чаты%20и%20рубрики%20Синего%20Рассвета.docx&name=Ссылки%20на%20чаты%20и%20рубрики%20Синего%20Рассвета.docx" },
];

const iconSvg = (type) => {
  if (type === "folder") return '<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>';
  if (type === "xlsx") return '<svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>';
  return '<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
};

let activeCat = "Все";
let query = "";
const expanded = new Set();

function prettyName(url) {
  try {
    const u = new URL(url);
    let name = u.searchParams.get("name") || "";
    if (!name) {
      const parts = decodeURIComponent(u.pathname).split("/");
      name = parts[parts.length - 1] || url;
    }
    name = name.replace(/\.[a-z0-9]+$/i, "").replace(/_/g, " ").trim();
    return name;
  } catch (e) { return url; }
}

const cats = ["Все", ...Array.from(new Set(items.map(i => i.category)))];

function render() {
  const catsEl = document.getElementById("cats");
  catsEl.innerHTML = cats.map(c => `
    <button data-cat="${c}" class="px-3 py-1.5 rounded-full text-sm transition ${activeCat === c ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}">${c}</button>
  `).join("");
  catsEl.querySelectorAll("button").forEach(b => b.addEventListener("click", () => { activeCat = b.dataset.cat; render(); }));

  const q = query.trim().toLowerCase();
  const filtered = items.filter(i => {
    const mc = activeCat === "Все" || i.category === activeCat;
    const mq = !q || i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || i.category.toLowerCase().includes(q);
    return mc && mq;
  });

  document.getElementById("count").textContent = "Найдено материалов: " + filtered.length;
  document.getElementById("empty").classList.toggle("hidden", filtered.length !== 0);
  document.getElementById("grid").innerHTML = filtered.map(i => {
    const hasChildren = Array.isArray(i.children) && i.children.length > 0;
    const isOpen = expanded.has(i.title);
    const head = `
      <div class="flex items-start justify-between mb-3">
        <div class="w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100">${iconSvg(i.type)}</div>
        ${hasChildren
          ? `<svg class="w-4 h-4 text-slate-400 transition-transform ${isOpen ? "rotate-180" : ""}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>`
          : `<svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 3h7v7M10 14L21 3M21 14v7H3V3h7"/></svg>`}
      </div>
      <h3 class="font-medium text-slate-900 leading-snug mb-2">${i.title}</h3>
      <p class="text-sm text-slate-500 leading-relaxed mb-4 flex-1">${i.desc}</p>
      <div class="text-xs text-slate-400 uppercase tracking-wide">${i.category}${hasChildren ? " · " + i.children.length + " док." : ""}</div>`;

    if (hasChildren) {
      const list = isOpen ? `
        <div class="mt-4 pt-4 border-t border-slate-100 space-y-2">
          ${i.children.map(url => `
            <a href="${url}" target="_blank" rel="noopener"
               class="flex items-start gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
              <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              <span>${prettyName(url)}</span>
            </a>`).join("")}
        </div>` : "";
      return `
        <div data-toggle="${i.title}"
             class="cursor-pointer bg-white/90 border ${isOpen ? "border-blue-400 shadow-md" : "border-slate-200"} rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
          ${head}${list}
        </div>`;
    }
    return `
      <a href="${i.url || FOLDER_URL}" target="_blank" rel="noopener"
         class="group bg-white/90 border border-slate-200 rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
        ${head}
      </a>`;
  }).join("");

  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const k = el.getAttribute("data-toggle");
      if (expanded.has(k)) expanded.delete(k); else expanded.add(k);
      render();
    });
  });
}

document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });
render();
</script>
</body>
</html>
