// Строим словарь синонимов из групп
const SYNONYMS = {};
TERM_GROUPS.forEach(group => {
  group.forEach(term => { SYNONYMS[term] = group.filter(t => t !== term); });
});

let activeTerms = [];

function expandQuery(q) {
  const words = q.trim().split(/\s+/).filter(Boolean);
  const e = new Set(words);
  words.forEach(w => { if (SYNONYMS[w]) SYNONYMS[w].forEach(s => e.add(s)); });
  return Array.from(e);
}

function termMatch(text, term) {
  const t = (text || "").toLowerCase();
  if (t.includes(term)) return 2;
  if (term.length >= 4) {
    for (let n = term.length - 1; n >= 4; n--) {
      if (t.includes(term.slice(0, n))) return 1;
    }
  }
  return 0;
}

function scoreItem(item, terms) {
  let s = 0;
  terms.forEach(t => {
    s += termMatch(item.title, t) * 10;
    s += termMatch(item.category, t) * 5;
    s += termMatch(item.desc, t) * 3;
    (item.links || []).forEach(l => { s += termMatch(l.title, t) * 2; s += termMatch(l.desc, t); });
    (item.books || []).forEach(b => { s += termMatch(b.title, t) * 2; s += termMatch(b.author, t); });
    (item.children || []).forEach(c => { if (typeof c === "string") s += termMatch(c, t); });
  });
  return s;
}

function highlight(text, terms) {
  if (!terms || !terms.length || !text) return escapeHtml(text || "");
  const lower = text.toLowerCase();
  let r = escapeHtml(text);
  const done = new Set();
  terms.forEach(term => {
    if (term.length < 3) return;
    // Выбираем одну строку для подсветки: полный термин или лучший префикс
    let toMark = null;
    if (lower.includes(term)) {
      toMark = term;
    } else if (term.length >= 5) {
      for (let n = term.length - 1; n >= 4; n--) {
        const prefix = term.slice(0, n);
        if (lower.includes(prefix)) { toMark = prefix; break; }
      }
    }
    if (!toMark || done.has(toMark)) return;
    done.add(toMark);
    const re = new RegExp(toMark.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
    r = r.replace(re, m => `<mark>${m}</mark>`);
  });
  return r;
}

function scoreLink(title, desc, parentTitle, terms) {
  let s = 0;
  terms.forEach(t => {
    s += termMatch(title, t) * 10;
    s += termMatch(desc, t) * 3;
    s += termMatch(parentTitle, t) * 1;
  });
  return s;
}

      });

        if (s > 0) results.push({ title: name, desc: "", url, parent: item.title, category: item.category, type: "docx", score: s });
      });
    }

    </${tag}>`;
  }).join("");
}

function prettyName(url) {
  try {
    const u = new URL(url);
    let name = u.searchParams.get("name") || "";
    if (!name) {
      const parts = decodeURIComponent(u.pathname).split("/");
      name = parts[parts.length - 1] || url;
    }
    return name.replace(/\.[a-z0-9]+$/i, "").replace(/_/g, " ").trim();
  } catch (e) { return url; }
}

    {
      "title": "Книги, которые рекомендуют наши подписчики",
      "type": "docx",
      "category": "Обучение",
      "desc": "Список книг от сообщества канала. Нажмите на название, чтобы прочитать аннотацию.",
      "slug": "books",
      "books": [
        { "author": "Фредерик Лалу", "title": "Открывая организации будущего", "annotation": "Принципиально новый взгляд на развитие организаций, который поможет перейти на следующий уровень развития и построить сознательную и цельную компанию будущего.\n\nБольшинство книг по организационному развитию написаны для тех, кто стремится овладеть тайнами завоевания рынков и увеличить прибыль. Но то, как мы привыкли управлять, безнадежно устарело. Эта книга — пособие для руководителей, которые почувствовали, что в привычном стиле руководства чего-то недостает.\n\nВ первой части автор предлагает масштабный исторический обзор эволюции организационных парадигм. Во второй — на примере реальных организаций рассказывает, как по-новому, с вниманием к людям, можно организовывать работу. Третья часть рассматривает условия успешного перехода к этой модели." },
        { "author": "Джефф Смарт, Рэнди Стрит", "title": "Кто", "annotation": "Простое, практичное и эффективное решение того, что The Economist называет «главной проблемой бизнеса сегодня» — неэффективного найма. Приём на работу неподходящего сотрудника обходится компании в сумму, которая превышает размер его заработной платы в 15 раз.\n\nАвторы разработали стратегию найма из 4 шагов:\n1) составление оценочного листа (что мы ждём от сотрудника);\n2) поиск (где брать людей);\n3) отбор лучших (4 интервью);\n4) сделка (как уговорить нужного человека).\n\nКнига основана на интервью с 20 миллиардерами, 30 топ-менеджерами и собственном опыте авторов, которые консультируют компании по найму." },
        { "author": "Тимоти Голви", "title": "Работа как внутренняя игра. Раскрытие личного потенциала", "annotation": "Книга рассказывает о том, как добиться максимальной самореализации, раскрыть весь потенциал своего «я», легко, без перегрузок и насилия над собой добиться высоких результатов в работе.\n\nНекоторые темы:\n• как получать удовольствие от работы;\n• как преодолеть скуку, связанную с рутинной работой;\n• как объективно оценивать ситуацию на работе и свои перспективы;\n• как правильно отдыхать;\n• как научиться учиться, самостоятельно думать, невзирая на авторитеты и стереотипы." },
        { "author": "Ким Скотт", "title": "Человеческий фактор", "annotation": "Скотт утверждает, что истинный успех и высокая производительность достигаются тогда, когда руководители и сотрудники понимают и ценят друг друга на человеческом уровне. Она выделяет три ключевых компонента эффективных рабочих отношений:\n\n1. Умение по-настоящему заботиться о людях (Care Personally) — проявлять искренний интерес к сотрудникам, их жизни и благополучию.\n\n2. Готовность бросать вызов (Challenge Directly) — давать конструктивную критику и честную обратную связь. Забота о людях не означает избегание неприятных разговоров.\n\n3. Создание культуры доверия. Сочетание искренней заботы и прямой обратной связи создаёт атмосферу, где люди чувствуют себя безопасно, чтобы рисковать, ошибаться и учиться." },
        { "author": "Тимур Гагин", "title": "Руководитель-эксперт, или Руководство по эксплуатации человека человеком", "annotation": "Практическое пособие по эффективному управлению организацией. Автор синтезирует подходы из менеджмента, организационной психологии, бихевиоризма, НЛП и теории систем, предлагая более 500 приёмов для решения типичных управленческих задач.\n\nВ книге собраны оригинальные примеры и нестандартные решения по мотивации сотрудников, подбору персонала и наведению порядка в организации.\n\nНекоторые темы:\n• как заставить сотрудников работать успешно и с удовольствием;\n• как подбирать в организацию правильных людей;\n• как покончить с хаосом и навести порядок;\n• как раз и навсегда покончить с постоянными авралами." },
        { "author": "Александр Прохоров", "title": "Русская модель управления", "annotation": "Прохоров изучает российскую управленческую мифологию: что представляет собой отечественная модель управления, как использовать её особенности, какие черты — миф, а какие — реальность.\n\nКлючевая особенность русской модели управления по Прохорову — чередование двух противоположных режимов:\n\n• Стабильный/застойный — в стабильной фазе жизни общества правила игры не меняются, предприятия растут количественно.\n\n• Нестабильный/аварийно-мобилизационный — в нестабильные годы осваиваются новые технологии, реформируются структуры, в сжатые сроки внедряются инновации.\n\nПереход от стабильности к авралу и обратно воспринимается не как исключение, а как норма жизни команды, бизнеса и страны." },
        { "author": "Марк Розин", "title": "Восхождение по спирали", "annotation": "Эволюционная модель развития организации, основанная на теории спиральной динамики. С её помощью руководитель может понять, на каком этапе развития находится компания, распознать сигналы зарождающегося внутреннего кризиса и заранее предпринять действия.\n\nНекоторые аспекты модели:\n• Типология корпоративных культур на простом языке: холодные цвета — коллективистские культуры, тёплые — индивидуалистические.\n• Сравнение перехода от одной культуры к другой то с луковицей, то с маятником.\n• Обсуждение ситуации внешнего кризиса: организации склонны жертвовать многими эволюционными достижениями ради выживания.\n\nВ книге собрано множество примеров успешного преодоления кризисов российскими компаниями." },
        { "author": "Элияху Голдратт и Джефф Кокс", "title": "Цель. Процесс непрерывного совершенствования", "annotation": "Главный герой — директор завода Алекс Рого. Он сталкивается с кризисом: предприятие теряет деньги, заказы срываются, руководство угрожает закрытием. У Алекса есть три месяца, чтобы наладить работу. В отчаянии он обращается к бывшему преподавателю физики Ионе, который задаёт вопрос: «В чём твоя цель?»\n\nНекоторые идеи книги:\n• Цель бизнеса — зарабатывать деньги. Оптимизация каждой части по отдельности разрушает общую систему.\n• Важно не сколько деталей производит цех, а сколько готовой продукции доходит до клиента и превращается в деньги (throughput).\n• Непрерывное совершенствование: после устранения одного ограничения появляется новое слабое звено, поэтому процесс улучшений бесконечен." },
        { "author": "Рэй Далио", "title": "Принципы изменения мирового порядка", "annotation": "Далио исследует закономерности развития и угасания самых мощных экономик на протяжении последних 500 лет.\n\nНекоторые идеи книги:\n• История циклична: все великие державы проходят схожие этапы — рост, пик, упадок и замена новым лидером.\n• Факторы силы: подъём государства зависит от комбинации инноваций, сильной экономики, стабильной валюты и военной мощи.\n• Экономические циклы: финансовые кризисы и долговые перегрузки — неизбежная часть изменений мирового порядка.\n• Современные сдвиги: мир в стадии перехода, доминирование США ослабевает, Китай и другие страны укрепляют позиции." }

function render() {
  const catsEl = document.getElementById("cats");
  catsEl.innerHTML = cats.map(c => `
    <button data-cat="${c}" class="px-3 py-1.5 rounded-full text-sm transition ${activeCat === c ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}">${c}</button>
  `).join("");
  catsEl.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
    activeCat = b.dataset.cat;
    if (location.hash && location.hash !== "#/") {
      history.replaceState(null, "", "#/");
      document.getElementById("detail-view").classList.add("hidden");
      document.getElementById("list-view").classList.remove("hidden");
    }
    render();
  }));

  const q = query.trim().toLowerCase();
  activeTerms = q ? expandQuery(q) : [];

  if (q) {
    renderSearchResults(activeTerms);
    return;
  }

  document.getElementById("grid").className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";
  const filtered = items.filter(i => activeCat === "Все" || i.category === activeCat);

  document.getElementById("count").textContent = "Найдено материалов: " + filtered.length;
  document.getElementById("empty").classList.toggle("hidden", filtered.length !== 0);
  document.getElementById("grid").innerHTML = filtered.map(i => {
    const hasChildren = Array.isArray(i.children) && i.children.length > 0;
    const isOpen = expanded.has(i.title);
    const head = `
      <div class="flex items-start justify-between mb-3">
        <div style="width:32px;height:32px;flex-shrink:0;" class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100">${iconSvg(i.type)}</div>
        ${hasChildren
          ? `<svg class="w-4 h-4 text-slate-400 transition-transform ${isOpen ? "rotate-180" : ""}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>`
          : `<svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 3h7v7M10 14L21 3M21 14v7H3V3h7"/></svg>`}
      </div>
      <h3 class="font-medium text-slate-900 leading-snug mb-2">${highlight(i.title, activeTerms)}</h3>
      <p class="text-sm text-slate-500 leading-relaxed mb-4 flex-1">${highlight(i.desc, activeTerms)}</p>
      <div class="text-xs text-slate-400 uppercase tracking-wide">${i.category}${hasChildren ? " · " + i.children.length + " док." : ""}</div>`;

    if (hasChildren) {
      const list = isOpen ? `
        <div class="mt-4 pt-4 border-t border-slate-100 space-y-2">
          ${i.children.map(url => `
            <a href="${url}" target="_blank" rel="noopener"
               class="flex items-start gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
              <svg class="w-4 h-4 mt-0.5 flex-shrink-0 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              <span>${prettyName(url)}</span>
            </a>`).join("")}
        </div>` : "";
      return `
        <div data-toggle="${i.title}"
             class="cursor-pointer bg-white/90 border ${isOpen ? "border-blue-400 shadow-md" : "border-slate-200"} rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
          ${head}${list}
        </div>`;
    }
    if (Array.isArray(i.links) || Array.isArray(i.books)) {
      return `
        <a href="#/${getItemSlug(i)}"
           class="group bg-white/90 border border-slate-200 rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
          ${head}
        </a>`;
    }
    return `
      <a href="${i.url || FOLDER_URL}" target="_blank" rel="noopener"
         class="group bg-white/90 border border-slate-200 rounded-2xl p-5 hover:border-blue-400 hover:shadow-md transition flex flex-col">
        ${head}
      </a>`;
  }).join("");

  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const k = el.getAttribute("data-toggle");
      if (expanded.has(k)) expanded.delete(k); else expanded.add(k);
      render();
    });
  });
}

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function renderDetail(item) {
  let bodyHtml = "";
  if (Array.isArray(item.books)) {
    bodyHtml = `<div class="space-y-2">${item.books.map((b,idx)=>`
      <details class="group bg-white/90 border border-slate-200 rounded-xl open:border-blue-400 open:shadow-sm transition">
        <summary class="cursor-pointer list-none p-4 flex items-start justify-between gap-3">
          <div>
            <div class="font-medium text-slate-900 leading-snug">${escapeHtml(b.title)}</div>
            ${b.author ? `<div class="text-sm text-slate-500 mt-0.5">${escapeHtml(b.author)}</div>` : ""}
          </div>
          <svg class="w-4 h-4 mt-1 flex-shrink-0 text-slate-400 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </summary>
        <div class="px-4 pb-4 pt-0 text-sm text-slate-600 leading-relaxed whitespace-pre-line border-t border-slate-100">${escapeHtml(b.annotation)}</div>
      </details>`).join("")}</div>
      ${item.footer ? `<div class="mt-6 text-sm text-slate-500">${escapeHtml(item.footer)}</div>` : ""}`;
  } else {
    const linksHtml = (item.links || []).map(l => {
      const tag = l.url ? "a" : "div";
      const attrs = l.url ? `href="${l.url}" target="_blank" rel="noopener"` : "";
      const hover = l.url ? "hover:border-blue-400 hover:shadow-sm" : "";
      return `<${tag} ${attrs} class="block bg-white/90 border border-slate-200 rounded-xl p-4 ${hover} transition">
        <div class="font-medium text-slate-900">${l.title}</div>
        ${l.desc ? `<div class="text-sm text-slate-500 mt-1">${l.desc}</div>` : ""}
        ${l.url ? `<div class="text-xs text-blue-600 mt-2 truncate">${l.url}</div>` : ""}
      </${tag}>`;
    }).join("");
    bodyHtml = `<div class="space-y-3">${linksHtml || '<div class="text-slate-400">Пока нет ссылок.</div>'}</div>`;
  }

  document.getElementById("detail-view").innerHTML = `
    <a href="#/" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 mb-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Назад к библиотеке
    </a>
    <div class="mb-2 text-xs text-slate-400 uppercase tracking-wide">${item.category}</div>
    <h2 class="text-3xl font-semibold tracking-tight mb-3">${item.title}</h2>
    <p class="text-slate-500 mb-8">${item.desc}</p>
    ${bodyHtml}`;
}

function route() {
  const hash = location.hash.replace(/^#\/?/, "");
  const listView = document.getElementById("list-view");
  const detailView = document.getElementById("detail-view");
  if (hash) {
    const item = items.find(i => getItemSlug(i) === hash);
    if (item && (Array.isArray(item.links) || Array.isArray(item.books))) {
      listView.classList.add("hidden");
      detailView.classList.remove("hidden");
      renderDetail(item);
      window.scrollTo(0, 0);
      return;
    }
  }
  listView.classList.remove("hidden");
  detailView.classList.add("hidden");
  render();
}

window.addEventListener("hashchange", route);
document.getElementById("home-link").addEventListener("click", e => {
  e.preventDefault();
  query = "";
  activeCat = "Все";
  const s = document.getElementById("search"); if (s) s.value = "";
  if (location.hash && location.hash !== "#/") location.hash = "#/";
  else { document.getElementById("detail-view").classList.add("hidden");
         document.getElementById("list-view").classList.remove("hidden"); render(); }
});
document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  if (location.hash && location.hash !== "#/") {
    history.replaceState(null, "", "#/");
    document.getElementById("detail-view").classList.add("hidden");
    document.getElementById("list-view").classList.remove("hidden");
  }
  render();
});
